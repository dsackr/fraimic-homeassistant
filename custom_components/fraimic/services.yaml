send_image:
  name: Send Image
  description: Convert and send an image to a Fraimic e-ink frame.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to send the image to.
      required: true
      selector:
        device:
          integration: fraimic
    media_content_id:
      name: Image
      description: Image to send (select from your media library).
      required: true
      selector:
        media:
          accept:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
            - image/bmp
            - image/tiff

restart:
  name: Restart Frame
  description: Restart a Fraimic frame.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to restart.
      required: true
      selector:
        device:
          integration: fraimic

sleep:
  name: Sleep Frame
  description: Put a Fraimic frame into sleep mode.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to put to sleep.
      required: true
      selector:
        device:
          integration: fraimic

refresh:
  name: Refresh Display
  description: Trigger a display refresh on a Fraimic frame.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to refresh.
      required: true
      selector:
        device:
          integration: fraimic

send_scene:
  name: Send Scene
  description: Send a Fraimic scene's mapped images to their assigned frames all at once.
  fields:
    name:
      name: Scene
      description: The name of the scene to send (set up in the Fraimic panel's Scenes section).
      required: true
      selector:
        text:
