[tool.pytest.ini_options]
testpaths = ["tests/python"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["custom_components.digital_frames"]
omit = [
    "custom_components/digital_frames/digital-frames-panel.js",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
